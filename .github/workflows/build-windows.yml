name: Build Windows Executable

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 matplotlib pandas numpy pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller main.py --windowed --clean --noconfirm --name CPU-Scheduler `
          --collect-binaries PySide6 `
          --collect-binaries shiboken6 `
          --collect-data PySide6 `
          --collect-all matplotlib `
          --collect-all pandas `
          --collect-all numpy `
          --hidden-import PySide6.QtCore `
          --hidden-import PySide6.QtGui `
          --hidden-import PySide6.QtWidgets `
          --add-data "main.ui;." `
          --add-data "add_process.ui;." `
          --add-data "style.qss;." `
          --add-data "style_light.qss;."

    - name: Package distributable zip
      run: |
        Compress-Archive -Path "dist/CPU-Scheduler/*" -DestinationPath "dist/CPU-Scheduler-windows.zip" -Force
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CPU-Scheduler-Windows
        path: dist/CPU-Scheduler-windows.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/CPU-Scheduler-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
