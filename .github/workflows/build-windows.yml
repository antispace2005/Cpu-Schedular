name: Build Windows Executables

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 matplotlib pandas numpy pyinstaller
    
    - name: Build Qt executable (main.py)
      run: |
        pyinstaller main.py --windowed --clean --noconfirm --optimize 2 --name CPU-Scheduler-Qt `
          --distpath dist-qt --workpath build-qt --specpath spec-qt `
          --collect-binaries PySide6 `
          --collect-binaries shiboken6 `
          --collect-data PySide6 `
          --collect-data matplotlib `
          --collect-data pandas `
          --hidden-import PySide6.QtCore `
          --hidden-import PySide6.QtGui `
          --hidden-import PySide6.QtWidgets `
          --hidden-import matplotlib.backends.backend_qtagg `
          --hidden-import pandas `
          --hidden-import numpy `
          --exclude-module matplotlib.tests `
          --exclude-module numpy.tests `
          --exclude-module pandas.tests `
          --exclude-module pytest `
          --exclude-module IPython `
          --exclude-module jupyter `
          --exclude-module notebook `
          --exclude-module tkinter `
          --exclude-module scipy `
          --add-data "$env:GITHUB_WORKSPACE/main.ui;." `
          --add-data "$env:GITHUB_WORKSPACE/add_process.ui;." `
          --add-data "$env:GITHUB_WORKSPACE/style.qss;." `
          --add-data "$env:GITHUB_WORKSPACE/style_light.qss;."

    - name: Package Qt zip
      run: |
        Compress-Archive -Path "dist-qt/CPU-Scheduler-Qt/*" -DestinationPath "dist-qt/CPU-Scheduler-Qt-windows.zip" -Force

    - name: Build Tk executable (main2.py)
      if: hashFiles('main2.py') != ''
      run: |
        pyinstaller main2.py --windowed --clean --noconfirm --optimize 2 --name CPU-Scheduler-Tk `
          --distpath dist-tk --workpath build-tk --specpath spec-tk `
          --collect-data matplotlib `
          --collect-data pandas `
          --hidden-import matplotlib.backends.backend_tkagg `
          --hidden-import pandas `
          --hidden-import numpy `
          --exclude-module matplotlib.tests `
          --exclude-module numpy.tests `
          --exclude-module pandas.tests `
          --exclude-module pytest `
          --exclude-module IPython `
          --exclude-module jupyter `
          --exclude-module notebook `
          --exclude-module scipy

    - name: Package Tk zip
      if: hashFiles('main2.py') != ''
      run: |
        Compress-Archive -Path "dist-tk/CPU-Scheduler-Tk/*" -DestinationPath "dist-tk/CPU-Scheduler-Tk-windows.zip" -Force
    
    - name: Upload Qt artifact
      uses: actions/upload-artifact@v4
      with:
        name: CPU-Scheduler-Qt-Windows
        path: dist-qt/CPU-Scheduler-Qt-windows.zip

    - name: Upload Tk artifact
      if: hashFiles('main2.py') != ''
      uses: actions/upload-artifact@v4
      with:
        name: CPU-Scheduler-Tk-Windows
        path: dist-tk/CPU-Scheduler-Tk-windows.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist-qt/CPU-Scheduler-Qt-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
